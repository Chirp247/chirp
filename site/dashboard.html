<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — Chirp</title>
<link rel="icon" type="image/png" href="/logo.png">
<style>
  :root { --bg: #0a0e14; --surface: #12171f; --border: #1e2530; --text: #e0e6ed; --muted: #6b7a8d; --accent: #3b82f6; --accent2: #22d3ee; --green: #34d399; --red: #f87171; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; }

  .topbar { border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  .topbar .logo { font-size: 1.1rem; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
  .topbar .logo span { color: var(--accent); }
  .slug-form { display: flex; gap: 0.5rem; flex: 1; max-width: 400px; }
  .slug-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.75rem; color: var(--text); font-size: 0.9rem; outline: none; font-family: inherit; }
  .slug-input:focus { border-color: var(--accent); }
  .slug-input::placeholder { color: var(--muted); }
  .slug-btn { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 0.4rem 1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; }
  .slug-btn:hover { opacity: 0.85; }

  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

  .empty-state { text-align: center; padding: 6rem 1rem; }
  .empty-state h2 { font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--muted); }
  .empty-state p { color: var(--muted); font-size: 0.95rem; }

  .project-header { margin-bottom: 1.5rem; }
  .project-header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .project-meta { color: var(--muted); font-size: 0.9rem; margin-top: 0.25rem; }

  .controls { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .period-select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.35rem 0.6rem; font-size: 0.85rem; cursor: pointer; font-family: inherit; outline: none; }
  .period-select:focus { border-color: var(--accent); }

  .event-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .event-tab { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 0.3rem 0.7rem; cursor: pointer; font-size: 0.8rem; color: var(--muted); transition: all 0.15s; }
  .event-tab:hover { color: var(--text); border-color: #2a3040; }
  .event-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.1rem 1.2rem; }
  .stat-value { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; }
  .stat-value.blue { color: var(--accent); }
  .stat-value.cyan { color: var(--accent2); }
  .stat-value.green { color: var(--green); }
  .stat-label { color: var(--muted); font-size: 0.8rem; margin-top: 0.2rem; }

  .section { margin-bottom: 1.5rem; }
  .section-title { font-size: 0.85rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
  .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; }
  .chart-box svg { width: 100%; height: auto; display: block; }
  .chart-empty { color: var(--muted); font-size: 0.9rem; padding: 2rem; text-align: center; }

  .breakdowns { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; }
  .breakdown-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .breakdown-card h3 { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 0.75rem 1rem 0.5rem; }
  .breakdown-row { display: flex; align-items: center; padding: 0.45rem 1rem; font-size: 0.85rem; gap: 0.75rem; }
  .breakdown-row:nth-child(even) { background: rgba(255,255,255,0.015); }
  .breakdown-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .breakdown-bar-wrap { flex: 0 0 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .breakdown-bar { height: 100%; background: var(--accent); border-radius: 2px; }
  .breakdown-count { flex: 0 0 50px; text-align: right; color: var(--muted); font-size: 0.8rem; font-variant-numeric: tabular-nums; }

  .loading-msg { color: var(--muted); font-style: italic; font-size: 0.9rem; }
  .error-msg { color: var(--red); font-size: 0.9rem; }

  @media (max-width: 600px) {
    .topbar { flex-wrap: wrap; }
    .slug-form { max-width: none; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="/" class="logo"><img src="/logo.svg" alt="" width="22" height="22"><span>chirp</span></a>
  <form class="slug-form" id="slugForm">
    <input class="slug-input" id="slugInput" type="text" placeholder="Enter project slug..." autocomplete="off" spellcheck="false">
    <button class="slug-btn" type="submit">Load</button>
  </form>
</div>

<div class="container">
  <div id="emptyState" class="empty-state">
    <h2>Project Dashboard</h2>
    <p>Enter a project slug above to view its telemetry.</p>
  </div>
  <div id="dashboard" style="display:none">
    <div class="project-header">
      <h1 id="projectName"></h1>
      <div class="project-meta" id="projectMeta"></div>
    </div>
    <div class="controls">
      <select class="period-select" id="periodSelect">
        <option value="7d">7 days</option>
        <option value="30d" selected>30 days</option>
        <option value="90d">90 days</option>
        <option value="12m">12 months</option>
        <option value="all">All time</option>
      </select>
      <div class="event-tabs" id="eventTabs"></div>
    </div>
    <div class="stats" id="statsRow"></div>
    <div class="section">
      <div class="section-title">Timeline</div>
      <div class="chart-box" id="chartBox"><div class="chart-empty">Loading...</div></div>
    </div>
    <div class="section" id="breakdownSection" style="display:none">
      <div class="section-title">Dimensions</div>
      <div class="breakdowns" id="breakdownsGrid"></div>
    </div>
  </div>
</div>

<script>
var API = "https://api.chirp247.com";
var projectInfo = null;
var currentEvent = null;
var currentPeriod = "30d";
var currentSlug = "";

function $(id) { return document.getElementById(id); }

function fetchJSON(url) {
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error(r.status + " " + r.statusText);
    return r.json();
  });
}

function formatNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
  if (n >= 1000) return (n / 1000).toFixed(1) + "k";
  return String(n);
}

// URL hash routing
function setHash(slug) {
  history.replaceState(null, "", "#" + slug);
}

function getHash() {
  var h = location.hash.replace(/^#/, "");
  return decodeURIComponent(h);
}

// Load project
function loadProject(slug) {
  if (!slug) return;
  currentSlug = slug;
  $("slugInput").value = slug;
  setHash(slug);
  $("emptyState").style.display = "none";
  $("dashboard").style.display = "";
  $("projectName").textContent = "Loading...";
  $("projectMeta").textContent = "";
  $("statsRow").innerHTML = "";
  $("chartBox").innerHTML = '<div class="chart-empty">Loading...</div>';
  $("breakdownSection").style.display = "none";
  $("eventTabs").innerHTML = "";

  fetchJSON(API + "/api/v1/project/" + encodeURIComponent(slug))
    .then(function(info) {
      projectInfo = info;
      $("projectName").textContent = info.displayName || info.name;
      $("projectMeta").textContent = formatNum(info.totalCount) + " total events" + (info.firstEvent ? " \u00b7 since " + info.firstEvent : "");

      var tabs = $("eventTabs");
      tabs.innerHTML = "";
      for (var i = 0; i < info.events.length; i++) {
        var ev = info.events[i];
        var tab = document.createElement("div");
        tab.className = "event-tab" + (i === 0 ? " active" : "");
        tab.textContent = ev.name;
        tab.setAttribute("data-event", ev.name);
        tab.onclick = function() { selectEvent(this.getAttribute("data-event"), this); };
        tabs.appendChild(tab);
      }

      if (info.events.length > 0) {
        currentEvent = info.events[0].name;
        loadEventData();
      } else {
        $("statsRow").innerHTML = "";
        $("chartBox").innerHTML = '<div class="chart-empty">No events recorded yet.</div>';
      }
    })
    .catch(function(e) {
      $("projectName").textContent = slug;
      $("projectMeta").innerHTML = '<span class="error-msg">Could not load project: ' + e.message + '</span>';
    });
}

function selectEvent(name, el) {
  currentEvent = name;
  var all = document.querySelectorAll(".event-tab");
  for (var i = 0; i < all.length; i++) all[i].classList.remove("active");
  if (el) el.classList.add("active");
  loadEventData();
}

function loadEventData() {
  if (!currentEvent || !currentSlug) return;

  fetchJSON(API + "/api/v1/query?project=" + encodeURIComponent(currentSlug) + "&event=" + encodeURIComponent(currentEvent) + "&period=" + currentPeriod)
    .then(function(data) {
      $("statsRow").innerHTML =
        '<div class="stat-card"><div class="stat-value blue">' + formatNum(data.total) + '</div><div class="stat-label">Events</div></div>' +
        '<div class="stat-card"><div class="stat-value cyan">' + formatNum(data.uniqueClients) + '</div><div class="stat-label">Unique Clients</div></div>' +
        '<div class="stat-card"><div class="stat-value green">' + (data.series ? data.series.length : 0) + '</div><div class="stat-label">Active Days</div></div>';
      renderChart(data.series || []);
    })
    .catch(function(e) {
      $("chartBox").innerHTML = '<div class="chart-empty error-msg">Failed to load: ' + e.message + '</div>';
    });

  // Find current event info for dimensions
  var ev = null;
  if (projectInfo && projectInfo.events) {
    for (var i = 0; i < projectInfo.events.length; i++) {
      if (projectInfo.events[i].name === currentEvent) { ev = projectInfo.events[i]; break; }
    }
  }
  // Filter out empty dimension names
  var dims = [];
  if (ev && ev.dimensions) {
    for (var i = 0; i < ev.dimensions.length; i++) {
      if (ev.dimensions[i] && ev.dimensions[i].length > 0) dims.push(ev.dimensions[i]);
    }
  }
  if (dims.length > 0) {
    $("breakdownSection").style.display = "";
    loadBreakdowns(dims);
  } else {
    $("breakdownSection").style.display = "none";
  }
}

function renderChart(series) {
  var box = $("chartBox");
  if (!series.length) { box.innerHTML = '<div class="chart-empty">No data for this period.</div>'; return; }

  var mx = 0;
  for (var i = 0; i < series.length; i++) { if (series[i].count > mx) mx = series[i].count; }

  var w = 900, h = 260, pl = 45, pr = 10, pt = 10, pb = 30;
  var cw = w - pl - pr, ch = h - pt - pb;
  var gap = Math.max(1, Math.min(3, Math.floor(cw / series.length * 0.15)));
  var bw = Math.max(2, (cw - gap * series.length) / series.length);

  // Grid lines
  var svg = "";
  for (var i = 0; i <= 4; i++) {
    var v = Math.round(mx * (i / 4));
    var y = pt + ch - (ch * i / 4);
    svg += '<line x1="' + pl + '" y1="' + y + '" x2="' + (w - pr) + '" y2="' + y + '" stroke="#1e2530" stroke-width="1"/>';
    svg += '<text x="' + (pl - 6) + '" y="' + (y + 3) + '" text-anchor="end" fill="#6b7a8d" font-size="10">' + formatNum(v) + '</text>';
  }

  // Bars
  for (var i = 0; i < series.length; i++) {
    var x = pl + i * (bw + gap);
    var bh = mx > 0 ? (series[i].count / mx) * ch : 0;
    var y = pt + ch - bh;
    var r = Math.min(2, bw / 2);
    if (bh > 0) {
      svg += '<rect x="' + x + '" y="' + y + '" width="' + bw + '" height="' + bh + '" rx="' + r + '" fill="#3b82f6" opacity="0.85">';
      svg += '<title>' + series[i].date + ': ' + series[i].count + ' events</title></rect>';
    }
  }

  // X labels
  var step = Math.max(1, Math.floor(series.length / 8));
  for (var i = 0; i < series.length; i += step) {
    var x = pl + i * (bw + gap) + bw / 2;
    svg += '<text x="' + x + '" y="' + (h - 6) + '" text-anchor="middle" fill="#6b7a8d" font-size="10">' + series[i].date.slice(5) + '</text>';
  }

  box.innerHTML = '<svg viewBox="0 0 ' + w + ' ' + h + '">' + svg + '</svg>';
}

function loadBreakdowns(dims) {
  var grid = $("breakdownsGrid");
  grid.innerHTML = "";
  for (var di = 0; di < dims.length; di++) {
    (function(dim) {
      fetchJSON(API + "/api/v1/query?project=" + encodeURIComponent(currentSlug) + "&event=" + encodeURIComponent(currentEvent) + "&period=" + currentPeriod + "&group_by=" + encodeURIComponent(dim))
        .then(function(data) {
          if (!data.breakdown || !data.breakdown.length) return;
          var card = document.createElement("div");
          card.className = "breakdown-card";
          var html = '<h3>' + dim + '</h3>';
          var mx = data.breakdown[0].count;
          for (var i = 0; i < data.breakdown.length && i < 10; i++) {
            var r = data.breakdown[i];
            var pct = mx > 0 ? Math.round(r.count / mx * 100) : 0;
            html += '<div class="breakdown-row">' +
              '<div class="breakdown-name">' + (r.value || "\u2014") + '</div>' +
              '<div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:' + pct + '%"></div></div>' +
              '<div class="breakdown-count">' + formatNum(r.count) + '</div>' +
              '</div>';
          }
          card.innerHTML = html;
          grid.appendChild(card);
        })
        .catch(function() {});
    })(dims[di]);
  }
}

// Events
$("slugForm").addEventListener("submit", function(e) {
  e.preventDefault();
  var v = $("slugInput").value.trim();
  if (v) loadProject(v);
});

$("periodSelect").addEventListener("change", function(e) {
  currentPeriod = e.target.value;
  loadEventData();
});

// Init from hash
var initial = getHash();
if (initial) loadProject(initial);
</script>
</body>
</html>
