<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Three signal bars representing telemetry/chirp pulses -->
  <g transform="translate(256, 240)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="28" fill="#3b82f6"/>
    <!-- Inner arc -->
    <path d="M -60,-60 A 85,85 0 0,1 60,-60" fill="none" stroke="#3b82f6" stroke-width="18" stroke-linecap="round" opacity="0.7"/>
    <!-- Outer arc -->
    <path d="M -110,-110 A 155,155 0 0,1 110,-110" fill="none" stroke="#22d3ee" stroke-width="18" stroke-linecap="round" opacity="0.5"/>
    <!-- Outermost arc -->
    <path d="M -160,-160 A 226,226 0 0,1 160,-160" fill="none" stroke="#22d3ee" stroke-width="18" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- "chirp" text -->
  <text x="256" y="400" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#e0e6ed" letter-spacing="-2">chirp</text>
</svg>
